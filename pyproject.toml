[project]
name = "rasptorch"
version = "3.4.0"
description = "Experimental PyTorch-like autograd engine with an optional Vulkan compute backend (Raspberry Pi 5-focused)."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
	"numpy>=2.4.4",
	"vulkan>=1.3.275.1",
	"click>=8.0",
	"prompt-toolkit>=3.0",
	"streamlit>=1.56.0",
	"pytest>=9.0.3",
	"build*",
	"twine>=6.2.0",
	"requests==2.33.1",
	"pygments==2.20.0",
	"pyopencl>=2026.1.2",
	"mako>=1.3.11",
]


license = "MIT"
license-files = ["LICENSE"]
authors = [
	{ name = "Joshua Ludolf" },
]
keywords = ["deep-learning", "autograd", "vulkan", "raspberry-pi"]
classifiers = [
	"Development Status :: 4 - Beta",
	"Intended Audience :: Developers",
	"Intended Audience :: Science/Research",
	"Programming Language :: Python :: 3",
	"Programming Language :: Python :: 3 :: Only",
	"Programming Language :: Python :: 3.11",
	"Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
# Optional dependencies kept as extras so CPU-only installs and CI stay lightweight.
# On Pi 5, you likely want: `pip install rasptorch[gpu]`.
gpu = ["vulkan>=1.3.275.1"]
cuda = ["cupy>=14.0.1"]
torch = []
dev = ["pytest", "build", "twine>=6.2.0"]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["rasptorch*"]

[tool.setuptools.package-data]
rasptorch = ["shaders/*.spv", "shaders/*.comp"]

[project.scripts]
rasptorch = "rasptorch.CLI.cli:cli"
rasptorch-setup = "rasptorch._cli_setup:setup_shell_alias"

[project.urls]
Homepage = "https://github.com/Joshua-Ludolf/rasptorch"
Issues = "https://github.com/Joshua-Ludolf/rasptorch/issues"
